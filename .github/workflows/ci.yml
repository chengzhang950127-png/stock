name: backend-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: quant
          POSTGRES_PASSWORD: quant
          POSTGRES_DB: quant_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quant"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+psycopg://quant:quant@localhost:5432/quant_dev
      APP_ENV: test
      LLM_PROVIDER: mock

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.5.4"

      - name: Set up Python
        run: uv python install 3.11

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: |
          uv run ruff check src/ tests/ scripts/
          uv run ruff format --check src/ tests/ scripts/

      - name: Type check
        run: uv run mypy src/

      - name: Verify architectural invariants
        run: uv run python scripts/verify_invariants.py

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -v --cov=src --cov-report=term-missing
